<section class="flex items-center justify-center min-h-[calc(100vh-64px)] bg-slate-50 px-4">
  <div class="bg-white rounded-2xl shadow-lg border border-slate-200 w-full max-w-md p-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-900 mb-1">Login</h1>
      <p class="text-slate-500 text-sm">Sign in to the university management system.</p>
    </div>

    <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 mb-4 text-sm" *ngIf="error">
      {{ error }}
    </div>

    <div class="bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-4 text-sm" *ngIf="message">
      {{ message }}
    </div>

    <div class="bg-slate-50 rounded-xl border border-slate-200 p-5 mb-4" *ngIf="currentUser">
      <h2 class="text-lg font-bold text-slate-800 mb-3">You are logged in</h2>
      <p class="text-sm text-slate-600 mb-1"><span class="font-semibold">Name:</span> {{ currentUser.fullName }}</p>
      <p class="text-sm text-slate-600 mb-1"><span class="font-semibold">Username:</span> {{ currentUser.username }}</p>
      <p class="text-sm text-slate-600 mb-4"><span class="font-semibold">Role:</span>
        <span class="ml-1 bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full text-xs font-bold">{{ currentUser.role }}</span>
      </p>
      <button class="bg-slate-100 text-slate-700 border-0 rounded-xl px-4 py-2 text-sm font-semibold cursor-pointer hover:bg-slate-200 transition-colors" type="button" (click)="logout()">
        Logout
      </button>
    </div>

    <form *ngIf="!currentUser" (ngSubmit)="login()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-700">Username</label>
        <input
          class="w-full border border-slate-300 rounded-xl px-3.5 py-2.5 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100 transition-all"
          type="text"
          name="username"
          [(ngModel)]="form.username"
          placeholder="admin or student"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-700">Password</label>
        <input
          class="w-full border border-slate-300 rounded-xl px-3.5 py-2.5 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100 transition-all"
          type="password"
          name="password"
          [(ngModel)]="form.password"
          placeholder="admin123 or student123"
        />
      </div>

      <button
        class="w-full bg-sky-500 hover:bg-sky-600 text-white border-0 rounded-xl py-2.5 text-sm font-bold cursor-pointer transition-colors disabled:opacity-60 disabled:cursor-not-allowed mt-1"
        type="submit"
        [disabled]="loading"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

      <div class="bg-slate-50 rounded-xl border border-slate-200 px-4 py-3 text-xs text-slate-500 text-center">
        Demo accounts:
        <span class="font-bold text-slate-700"> admin</span> / admin123 &nbsp;·&nbsp;
        <span class="font-bold text-slate-700">student</span> / student123
      </div>
    </form>
  </div>
</section>
