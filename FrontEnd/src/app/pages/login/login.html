<section class="login-page">
  <div class="login-card">
    <div class="page-header">
      <h1>Login</h1>
      <p class="muted">Sign in to the university management system.</p>
    </div>

    <div class="alert error" *ngIf="error">
      {{ error }}
    </div>

    <div class="alert success" *ngIf="message">
      {{ message }}
    </div>

    <div *ngIf="currentUser" class="user-panel">
      <h2>You are logged in</h2>

      <p><strong>Name:</strong> {{ currentUser.fullName }}</p>
      <p><strong>Username:</strong> {{ currentUser.username }}</p>
      <p><strong>Role:</strong> {{ currentUser.role }}</p>

      <button class="btn-ghost" type="button" (click)="logout()">
        Logout
      </button>
    </div>

    <form *ngIf="!currentUser" (ngSubmit)="login()" class="login-form">
      <div class="field">
        <label>Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="form.username"
          placeholder="admin or student"
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="form.password"
          placeholder="admin123 or student123"
        />
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

      <div class="hint">
        Demo accounts:
        <br />
        <strong>admin</strong> / admin123
        <br />
        <strong>student</strong> / student123
      </div>
    </form>
  </div>
</section>
