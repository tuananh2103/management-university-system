<header class="bg-slate-900 text-white px-8 flex items-center justify-between flex-wrap gap-4 py-4 lg:h-16 lg:py-0">
  <a routerLink="/" class="text-white no-underline text-xl font-extrabold tracking-tight">
    🎓 MyUniversity
  </a>

  <nav class="flex items-center gap-2 flex-wrap">
    <a
      routerLink="/"
      routerLinkActive="bg-sky-500! text-sky-950!"
      [routerLinkActiveOptions]="{ exact: true }"
      class="text-gray-200 no-underline px-4 py-2 rounded-full text-sm transition-colors hover:bg-white/10"
    >
      Home
    </a>

    <ng-container *ngIf="isLoggedIn">
      <a routerLink="/students" routerLinkActive="bg-sky-500! text-sky-950!" class="text-gray-200 no-underline px-4 py-2 rounded-full text-sm transition-colors hover:bg-white/10">
        Students
      </a>
      <a routerLink="/courses" routerLinkActive="bg-sky-500! text-sky-950!" class="text-gray-200 no-underline px-4 py-2 rounded-full text-sm transition-colors hover:bg-white/10">
        Courses
      </a>
      <a routerLink="/library" routerLinkActive="bg-sky-500! text-sky-950!" class="text-gray-200 no-underline px-4 py-2 rounded-full text-sm transition-colors hover:bg-white/10">
        Library
      </a>
      <a routerLink="/cafeteria" routerLinkActive="bg-sky-500! text-sky-950!" class="text-gray-200 no-underline px-4 py-2 rounded-full text-sm transition-colors hover:bg-white/10">
        Cafeteria
      </a>
    </ng-container>

    <a
      *ngIf="!isLoggedIn"
      routerLink="/login"
      routerLinkActive="bg-sky-500! text-sky-950!"
      class="text-gray-200 no-underline px-4 py-2 rounded-full text-sm transition-colors hover:bg-white/10"
    >
      Login
    </a>

    <div class="flex items-center gap-3 ml-2 pl-4 border-l border-white/20" *ngIf="isLoggedIn && currentUser">
      <span class="text-gray-200 text-sm font-semibold">
        Hello, {{ currentUser.fullName }}
      </span>
      <button
        class="bg-slate-100 text-slate-900 border-0 rounded-full px-4 py-2 text-sm font-bold cursor-pointer hover:bg-slate-200 transition-colors"
        type="button"
        (click)="logout()"
      >
        Logout
      </button>
    </div>
  </nav>
</header>

<main class="min-h-[calc(100vh-64px)] bg-white">
  <router-outlet></router-outlet>
</main>
