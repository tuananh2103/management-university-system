version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: university_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./BackEnd
    ports:
      - "8080:8080"
    environment:
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/university_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: local_dev_secret_32_chars_minimum_xx
      FRONTEND_URL: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
