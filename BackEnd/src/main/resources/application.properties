spring.application.name=management-university

# DataSource
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/university_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:dev_secret_min_32_chars_xxxxxxxxxxxxxxxxx}
app.jwt.expiration-ms=86400000

# CORS / Frontend URL
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

server.port=${PORT:8080}
